

<script 
	async
	src="https://www.googletagmanager.com/gtag/js?id={{ site.tracker }}">
</script>

<script>
	window["ga-disable-{{ site.tracker }}"] =
		window.doNotTrack === "1" ||
		navigator.doNotTrack === "1" ||
		navigator.doNotTrack === "yes" ||
		navigator.msDoNotTrack === "1";
	
	window.dataLayer = window.dataLayer || [];
	
	function gtag() {
		dataLayer.push(arguments);
	}
	
	gtag("js", new Date());
	gtag("config", "{{ site.tracker }}");
</script>
